services:
  - type: web
    name: jinnah-legal
    env: node
    region: singapore
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: VITE_API_URL
        value: https://jinnah-legal.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
