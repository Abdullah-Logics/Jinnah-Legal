services:
  - type: web
    name: jinnah-signaling
    env: node
    region: ohio
    plan: free
    buildCommand: cd backend && npm install
    startCommand: node backend/standalone-signaling.js
    envVars:
      - key: CORS_ORIGIN
        value: https://ai-lawyer-blush.vercel.app
      - key: PORT
        value: "3002"
