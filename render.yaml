services:
  - type: web
    name: jinnah-signaling
    env: node
    region: ohio
    plan: free
    buildCommand: cd backend && npm install
    startCommand: node backend/standalone-signaling.js
    envVars:
      - key: CORS_ORIGIN
        value: https://ai-lawyer-blush.vercel.app
      - key: PORT
        value: "3002"

  - type: web
    name: jinnah-legal-api
    env: node
    region: ohio
    plan: free
    buildCommand: cd backend && npm install
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ai-lawyer-blush.vercel.app
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_tR6CmQfrEH3l@ep-muddy-morning-adsqi9v5-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
